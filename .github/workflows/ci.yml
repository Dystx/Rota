name: CI

on:
  pull_request:
  workflow_dispatch:

jobs:
  install-lint-typecheck-build-test:
    name: build typecheck test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.34.5

      - name: Setup Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Migration ordering lint
        run: pnpm check:migrations

      - name: Typecheck
        run: pnpm typecheck

      - name: Build
        run: pnpm build

      - name: Unit and smoke tests
        run: pnpm test

  e2e:
    name: e2e
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.34.5

      - name: Setup Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium

      - name: Run Playwright smoke tests
        run: pnpm --dir apps/web test:e2e

      - name: Upload Playwright reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-artifacts
          if-no-files-found: ignore
          path: |
            apps/web/playwright-report
            apps/web/playwright/test-results
            apps/web/playwright-report/results.json

      - name: Upload visual and a11y artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: web-quality-artifacts
          if-no-files-found: ignore
          path: |
            apps/web/playwright/tests/visual.spec.ts-snapshots
            apps/web/playwright/tests/accessibility.spec.ts-snapshots
            apps/web/lighthouse-report
            apps/web/.lighthouseci

  runtime-contract:
    name: self-hosted runtime contract
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.34.5

      - name: Setup Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Verify active runtime architecture
        run: node scripts/check-runtime-architecture.mjs

      - name: Verify Drizzle migration ordering
        run: pnpm check:migrations

      - name: Verify browser-safe domain contracts
        run: pnpm --filter @repo/types test
