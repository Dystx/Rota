<script>
        // Adjust input width dynamically based on content
        const inputs = document.querySelectorAll('.wizard-input');
        
        function resizeInput() {
            // A simple approximation. For production, a hidden span measuring text width is better.
            const minWidth = 100;
            const charWidth = 24; // approx for display font
            const valLen = this.value.length || this.placeholder.length;
            const calcWidth = Math.max(minWidth, valLen * charWidth);
            this.style.width = calcWidth + 'px';
        }

        inputs.forEach(input => {
            input.addEventListener('input', resizeInput);
            // Initial call if we were dynamically setting values
            // resizeInput.call(input); 
        });
    </script>
