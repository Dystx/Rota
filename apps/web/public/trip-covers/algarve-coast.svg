<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" preserveAspectRatio="xMidYMid slice" role="img" aria-label="Algarve golden cliffs and turquoise water">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#F0DAA0"/>
      <stop offset="0.4" stop-color="#E5B570"/>
      <stop offset="0.85" stop-color="#7A4A20"/>
      <stop offset="1" stop-color="#3A2510"/>
