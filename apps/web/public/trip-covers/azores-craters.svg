<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" preserveAspectRatio="xMidYMid slice" role="img" aria-label="Azores volcanic crater lakes">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#C8D8E0"/>
      <stop offset="0.4" stop-color="#7A98A8"/>
      <stop offset="0.85" stop-color="#3A4A5A"/>
      <stop offset="1" stop-color="#1A2A38"/>
