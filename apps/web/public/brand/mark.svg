<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none" aria-label="Rumia azulejo monogram">
  <!-- Frame: single rounded square, currentColor so tone swap paints it. -->
  <rect x="3" y="3" width="58" height="58" rx="4"
        fill="none" stroke="currentColor" stroke-width="1.5"/>

  <!-- 4 quarter-arc corner tiles. Authentic azulejo corner shape.
       Each arc traces the inner edge of the frame's corner, 8 units in,
       with rounded line caps. On dark surfaces the BrandMark component
       swaps ochre (#CE933F) for ochre-light (#EAB875). -->
  <path d="M3 11 A8 8 0 0 1 11 3" stroke="#CE933F" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <path d="M53 3 A8 8 0 0 1 61 11" stroke="#CE933F" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <path d="M61 53 A8 8 0 0 1 53 61" stroke="#CE933F" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <path d="M11 61 A8 8 0 0 1 3 53" stroke="#CE933F" stroke-width="2.5" fill="none" stroke-linecap="round"/>

  <!-- Olive stem with head + foot serifs baked into one filled path.
       Stem spans y=11 to y=52 (cap height 41); x=21..25 (4 units wide). -->
  <path d="M21 13 L25 11 L25 15 L25 48 L25 52 L21 50 Z" fill="currentColor"/>

  <!-- Wider R bowl + leg as a single ochre filled path.
       Bowl spans x=24..46 (22 units); counter opens to the right.
       Leg continues from bowl-stem junction (x=33, y=28) to baseline. -->
  <path d="M24 11 L38 11 C44 11 46 14 46 19 C46 24 44 27 38 28 L33 28 L46 49 L42 52 L31 32 L24 32 Z" fill="#CE933F"/>

  <!-- Glyph occupies ~55% of the frame. 6-unit right margin baked in so
       a wordmark beside the mark has optical kerning. -->
</svg>
