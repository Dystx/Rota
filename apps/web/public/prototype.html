                        <Route path="/planner" element={<PlannerPage />} />
                        <Route path="/logistics" element={<LogisticsPage />} />
                        <Route path="/checkout" element={<CheckoutPage />} />
                        <Route path="/itineraries" element={<ItinerariesPage />} />
                        <Route path="/vault" element={<VaultPage />} />
                        <Route path="/expert-chat" element={<ExpertChatPage />} />

                        {/* Admin / Console routes */}
                        <Route path="/console" element={<ConsolePipeline />} />
                        <Route path="/console/pipeline" element={<ConsolePipeline />} />
                        <Route path="/console/workspace" element={<ConsoleWorkspace />} />
                        <Route path="/console/messages" element={<ConsoleMessages />} />
                        <Route path="/console/graph" element={<ConsoleGraph />} />
                        <Route path="/console/metrics" element={<ConsoleMetrics />} />
                        <Route path="/console/config" element={<ConsoleConfig />} />
                    </Routes>
                </MemoryRouter>
            );
        };

        const root = createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
